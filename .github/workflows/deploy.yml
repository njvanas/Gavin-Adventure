# Publishes the static Construct 2 export via GitHub Actions → Pages (artifact).
# Repository Settings → Pages → Source MUST be "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate c2-smb1 export bundle
        run: |
          set -e
          for f in index.html c2runtime.js data.js jquery-2.1.1.min.js appmanifest.json sw.js; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          test -d images || { echo "Missing images/"; exit 1; }
          test -d media || { echo "Missing media/"; exit 1; }
          echo "OK: Construct 2 HTML5 export present"

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "Deployed: ${{ steps.deployment.outputs.page_url }}"
