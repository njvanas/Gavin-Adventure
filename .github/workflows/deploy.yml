# Publishes the static site via GitHub Actions → Pages (artifact).
# Repository Settings → Pages → Source MUST be "GitHub Actions" (not the gh-pages branch).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static bundle
        run: |
          set -e
          for f in index.html main.js style.css; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          test -d engine || { echo "Missing engine/"; exit 1; }
          test -d game || { echo "Missing game/"; exit 1; }
          for f in game/smbConstants.js game/smbIntegrator.js game/campaign.js; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          echo "OK: static game files present"

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "Deployed: ${{ steps.deployment.outputs.page_url }}"
          echo "If the site looks stale, confirm Settings → Pages → Build and deployment → Source = GitHub Actions."
