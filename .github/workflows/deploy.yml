# Publishes the static Gavin Adventure bundle via GitHub Actions → Pages (artifact).
# Repository Settings → Pages → Source MUST be "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gavin Adventure static bundle
        run: |
          set -e
          for f in index.html style.css main.js; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          test -d engine || { echo "Missing engine/"; exit 1; }
          test -d game || { echo "Missing game/"; exit 1; }
          for f in engine/core.js engine/input.js game/constants.js game/scenes.js; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          echo "OK: Gavin Adventure bundle present"

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "Deployed: ${{ steps.deployment.outputs.page_url }}"
